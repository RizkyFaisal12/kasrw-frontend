<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Pencatatan Kas RW (AWS Server)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 30px; background: #f8f9fa; color: #333; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 700px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        label { font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; }
        input, select { padding: 10px; border: 1px solid #ced4da; border-radius: 6px; font-size: 1rem; }
        button { grid-column: span 2; background: #28a745; color: white; padding: 12px; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #218838; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eceff1; }
        th { background: #007bff; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="text-align: center;">Aplikasi Pencatatan Kas RW</h1>
        
        <div class="card">
            <h3>Tambah Transaksi Baru (AWS)</h3>
            <form id="transaksiForm">
                <div style="display: flex; flex-direction: column;">
                    <label>Tanggal</label>
                    <input type="date" id="tanggal" required>
                </div>
                <div style="display: flex; flex-direction: column;">
                    <label>Jenis</label>
                    <select id="jenis" required>
                        <option value="pemasukan">Pemasukan</option>
                        <option value="pengeluaran">Pengeluaran</option>
                    </select>
                </div>
                <div class="full-width" style="display: flex; flex-direction: column;">
                    <label>Keterangan</label>
                    <input type="text" id="keterangan" placeholder="Contoh: Iuran Warga" required>
                </div>
                <div class="full-width" style="display: flex; flex-direction: column;">
                    <label>Jumlah Nominal (Rp)</label>
                    <input type="number" id="jumlah" placeholder="Angka saja" required>
                </div>
                <button type="submit">Simpan Transaksi</button>
            </form>
        </div>

        <h3>Riwayat Kas</h3>
        <table>
            <thead>
                <tr>
                    <th>Tanggal</th>
                    <th>Keterangan</th>
                    <th>Jenis</th>
                    <th>Jumlah</th>
                </tr>
            </thead>
            <tbody id="transaksiTableBody"></tbody>
        </table>
    </div>

    <script>
        // ALAMAT SUDAH DIKUNCI KE SERVER AWS LU LU PADA PORT 8000
        const API_URL = "http://100.30.241.42:8000/transaksi";

        document.getElementById('tanggal').valueAsDate = new Date();

        // Ambil Data dari AWS
        async function fetchTransaksi() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) return;
                const data = await response.json();
                const tbody = document.getElementById("transaksiTableBody");
                tbody.innerHTML = "";
                
                if (data.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Belum ada data di AWS</td></tr>";
                    return;
                }

                data.forEach(t => {
                    const warnaJumlah = t.jenis === 'pemasukan' ? '#28a745' : '#dc3545';
                    tbody.innerHTML += `<tr>
                        <td>${t.tanggal || '-'}</td>
                        <td><b>${t.keterangan}</b></td>
                        <td style="text-transform: capitalize;">${t.jenis}</td>
                        <td style="color: ${warnaJumlah}; font-weight: bold;">Rp ${Number(t.jumlah).toLocaleString('id-ID')}</td>
                    </tr>`;
                });
            } catch (error) {
                console.error("Gagal memuat data dari AWS:", error);
            }
        }

        // Simpan Data ke AWS
        document.getElementById("transaksiForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const tanggal = document.getElementById("tanggal").value;
            const keterangan = document.getElementById("keterangan").value;
            const jenis = document.getElementById("jenis").value;
            const jumlah = parseFloat(document.getElementById("jumlah").value);

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ tanggal, keterangan, jenis, jumlah })
                });

                if (response.ok) {
                    alert("GOKIL! Data Berhasil Masuk ke MySQL AWS!");
                    document.getElementById("transaksiForm").reset();
                    document.getElementById('tanggal').valueAsDate = new Date();
                    fetchTransaksi();
                } else {
                    const txt = await response.text();
                    alert("AWS Menolak: " + txt);
                }
            } catch (error) {
                alert("Gagal konek ke AWS! Pastikan Uvicorn di server AWS lu nyala dan Port 8000 udah di-open di Security Group AWS.");
            }
        });

        fetchTransaksi();
    </script>
</body>
</html>
